name: istic-manage
services:
  laravelbase:
    build:
        context: ./vendor/laravel/sail/runtimes/8.4
        dockerfile: Dockerfile
        args:
            WWWGROUP: '${WWWGROUP}'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WWWUSER: "${WWWUSER}"
      LARAVEL_SAIL: 1
    volumes:
      - ".:/var/www/html"
    networks:
      - sail
    deploy:
        replicas: 0
  istic-manage.dev:
    image: istic-manage-laravelbase
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      WWWUSER: "${WWWUSER}"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
      IGNITION_LOCAL_SITES_PATH: "${PWD}"
    volumes:
      - ".:/var/www/html"
    networks:
      sail:
        aliases:
          - istic-manage
    depends_on:
      - redis
      - mailpit

  vite:
    image: istic-manage-laravelbase
    command: npm run dev
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    environment:
      WWWUSER: "${WWWUSER}"
    volumes:
      - ".:/var/www/html"
    networks:
      - sail
    depends_on:
      - istic-manage.dev

