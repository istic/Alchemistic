  redis:
    healthcheck:
      retries: 3
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 5s
    image: redis:alpine
    networks:
      - sail
    ports:
      - ${FORWARD_REDIS_PORT:-6379}:6379
    volumes:
      - source: sail-redis
        target: /data
        type: volume
        volume: {}
  mailpit:
    image: "axllent/mailpit:latest"
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - sail
  ngrok:
    build:
      context: "./docker/ngrok"
      dockerfile: Dockerfile
    image: "sail-ngrok/app"
    entrypoint: ["/var/www/html/bin/start-ngrok.sh"]
    ports:
      - "4040:4040"
    environment:
      DOCKER: "true"
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
      NGROK_URL: "${NGROK_URL}"
      NGROK_WS_URL: "${NGROK_WS_URL}"
      NGROK_VITE_URL: "${NGROK_VITE_URL}"
      REVERB_SERVER_PORT: "${REVERB_SERVER_PORT:-8080}"
    volumes:
      - ".:/var/www/html"
      - "./ngrok.example.yaml:/var/www/html/ngrok.example.yaml"
    networks:
      - sail
    depends_on:
      - istic-manage.dev
    extra_hosts:
      - "istic-manage.dev:host-gateway"

networks:
  sail:
    driver: bridge
    name: istic-manage_sail
volumes:
  sail-redis:
    driver: local
    name: istic-manage_sail-redis
